name: "01 - AWS Backend Bootstrap v1.1"

on:
  workflow_dispatch: # Déclenchement manuel par bouton sur GitHub

permissions:
  id-token: write
  contents: read

jobs:
  bootstrap:
    name: "Créer le Backend S3 & DynamoDB"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform/bootstrap

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Correction : Utilisation temporaire des clés d'accès administrateur pour l'initialisation
      - name: Authentification AWS (Initialisation automatique)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # Regroupement propre de l'initialisation et du déploiement
      - name: Provisioner S3 & DynamoDB
        run: |
          terraform init
          terraform apply -auto-approve